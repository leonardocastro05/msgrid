<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clasificación de Carrera – MSGRID</title>
    <style>
      /* ── Base ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
      }

      /* ── Header ── */
      .header {
        background: #161b22;
        border-bottom: 1px solid #30363d;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header a {
        color: #58a6ff;
        text-decoration: none;
        font-size: 13px;
      }
      .header a:hover {
        text-decoration: underline;
      }
      .header h1 {
        font-size: 18px;
        color: #e6edf3;
      }

      /* ── Contenedor principal ── */
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* ── Formulario de búsqueda ── */
      .search-box {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px 24px;
        margin-bottom: 24px;
      }
      .search-box h2 {
        font-size: 15px;
        color: #8b949e;
        margin-bottom: 14px;
      }
      .search-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .search-row input {
        flex: 1;
        min-width: 180px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 9px 14px;
        color: #e6edf3;
        font-size: 14px;
      }
      .search-row input:focus {
        outline: none;
        border-color: #58a6ff;
      }
      .search-row input::placeholder {
        color: #484f58;
      }
      .btn-buscar {
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 9px 20px;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-buscar:hover {
        background: #2ea043;
      }
      .btn-buscar:disabled {
        background: #21262d;
        color: #484f58;
        cursor: not-allowed;
      }

      /* ── Info de carrera ── */
      .race-info {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 14px 20px;
        margin-bottom: 20px;
      }
      .race-info .race-name {
        font-size: 16px;
        font-weight: 600;
        color: #e6edf3;
      }
      .race-info .race-id {
        font-size: 12px;
        color: #8b949e;
      }

      /* ── Tabla de resultados ── */
      .table-wrap {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead tr {
        background: #21262d;
      }
      th {
        padding: 11px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #8b949e;
        border-bottom: 1px solid #30363d;
      }
      td {
        padding: 10px 14px;
        font-size: 13px;
        border-bottom: 1px solid #21262d;
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #1c2128;
      }

      /* Posición */
      .pos {
        font-weight: 700;
        font-size: 15px;
        color: #e6edf3;
        width: 42px;
      }
      .pos-1 {
        color: #ffd700;
      }
      .pos-2 {
        color: #c0c0c0;
      }
      .pos-3 {
        color: #cd7f32;
      }

      /* Piloto + equipo */
      .piloto-cell {
        min-width: 200px;
      }
      .piloto-nombre {
        font-weight: 600;
        color: #e6edf3;
      }
      .equipo-nombre {
        font-size: 11px;
        color: #8b949e;
        margin-top: 2px;
      }

      /* Bandera */
      .flag {
        font-size: 18px;
        margin-right: 8px;
        vertical-align: middle;
      }

      /* Puntos */
      .pts-cell {
        font-weight: 700;
        color: #58a6ff;
        width: 48px;
        text-align: right;
      }
      .pts-zero {
        color: #484f58;
      }

      /* Estado */
      .estado {
        padding: 28px;
        text-align: center;
        color: #8b949e;
      }
      .estado.error {
        color: #f85149;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/index.html">← Inicio</a>
      <h1>Clasificación de Carrera</h1>
    </div>

    <div class="container">
      <!-- Formulario -->
      <div class="search-box">
        <h2>Introduce el ID de la carrera de iGPManager</h2>
        <div class="search-row">
          <input
            id="inputCarreraId"
            type="text"
            placeholder="ID carrera (ej. 70218200)"
          />
          <button class="btn-buscar" id="btnBuscar" onclick="cargarCarrera()">
            Cargar resultados
          </button>
        </div>
        <p style="margin-top: 10px; font-size: 12px; color: #484f58">
          Encuéntralo en la URL de iGPManager: …/app/d=result&id=<strong
            style="color: #8b949e"
            >70218200</strong
          >&tier=1&tab=race
        </p>
      </div>

      <!-- Info de carrera (oculta hasta que cargue) -->
      <div class="race-info" id="raceInfo" style="display: none">
        <div>
          <div class="race-name" id="raceNombre">–</div>
          <div class="race-id" id="raceIdLabel">–</div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="table-wrap" id="tableWrap">
        <div class="estado" id="estado">
          Introduce un ID de carrera para cargar los resultados.
        </div>
      </div>
    </div>

    <script>
      // ── Leer ID desde URL si viene como ?carreraId=xxx ──────────────────────
      const params = new URLSearchParams(window.location.search);
      const idFromUrl = params.get("carreraId") || params.get("id");
      if (idFromUrl) {
        document.getElementById("inputCarreraId").value = idFromUrl;
        window.addEventListener("DOMContentLoaded", cargarCarrera);
      }

      // ── También reaccionar a Enter ───────────────────────────────────────────
      document
        .getElementById("inputCarreraId")
        ?.addEventListener("keydown", (e) => {
          if (e.key === "Enter") cargarCarrera();
        });

      // ── Cargar resultados ────────────────────────────────────────────────────
      async function cargarCarrera() {
        const id = document.getElementById("inputCarreraId").value.trim();
        if (!id) return setEstado("Introduce un ID de carrera válido.", false);

        const btn = document.getElementById("btnBuscar");
        btn.disabled = true;
        setEstado(
          '<span class="spinner"></span>Cargando resultados de iGPManager…',
          false,
        );
        ocultarInfo();

        try {
          const token = getToken();
          const res = await fetch(
            `/api/igp/carrera/${encodeURIComponent(id)}`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `Error ${res.status}`);
          }

          const data = await res.json();
          renderTabla(data);
        } catch (err) {
          setEstado(`❌ ${err.message}`, true);
        } finally {
          btn.disabled = false;
        }
      }

      // ── Renderizar tabla ─────────────────────────────────────────────────────
      function renderTabla(data) {
        const { carreraId, nombre, resultados } = data;

        // Info de carrera
        document.getElementById("raceNombre").textContent =
          nombre || `Carrera ${carreraId}`;
        document.getElementById("raceIdLabel").textContent = `ID: ${carreraId}`;
        document.getElementById("raceInfo").style.display = "flex";

        if (!resultados || resultados.length === 0) {
          setEstado("No se encontraron resultados para esta carrera.", false);
          return;
        }

        const wrap = document.getElementById("tableWrap");
        wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Pos</th>
            <th>Piloto y Equipo</th>
            <th>Finalizado</th>
            <th>Mejor vuelta</th>
            <th>Vel. Máx.</th>
            <th>Bases</th>
            <th style="text-align:right">Ptos</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    `;

        const tbody = document.getElementById("tbody");
        resultados.forEach((p) => {
          const tr = document.createElement("tr");
          const posClass =
            p.pos === 1
              ? "pos-1"
              : p.pos === 2
                ? "pos-2"
                : p.pos === 3
                  ? "pos-3"
                  : "";
          tr.innerHTML = `
        <td class="pos ${posClass}">${p.pos}</td>
        <td class="piloto-cell">
          <span class="flag">${bandera(p.pais)}</span>
          <span class="piloto-nombre">${esc(p.piloto)}</span>
          <div class="equipo-nombre">${esc(p.equipo)}</div>
        </td>
        <td>${esc(p.tiempo)}</td>
        <td>${esc(p.mejorVuelta)}</td>
        <td>${esc(p.velMax)}</td>
        <td>${p.bases || "–"}</td>
        <td class="pts-cell ${p.pts === 0 ? "pts-zero" : ""}">${p.pts || "–"}</td>
      `;
          tbody.appendChild(tr);
        });
      }

      // ── Helpers ──────────────────────────────────────────────────────────────
      function setEstado(msg, isError) {
        document.getElementById("tableWrap").innerHTML =
          `<div class="estado${isError ? " error" : ""}">${msg}</div>`;
      }

      function ocultarInfo() {
        document.getElementById("raceInfo").style.display = "none";
      }

      function esc(str) {
        return (str || "–")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function getToken() {
        // El token se guarda en localStorage al hacer login en msgrid
        return localStorage.getItem("token") || "";
      }

      // Emojis de banderas a partir del código ISO de 2 letras
      function bandera(codigo) {
        if (!codigo || codigo.length !== 2) return "🏁";
        return String.fromCodePoint(
          ...[...codigo.toUpperCase()].map(
            (c) => 0x1f1e6 + c.charCodeAt(0) - 65,
          ),
        );
      }
    </script>
  </body>
</html>
