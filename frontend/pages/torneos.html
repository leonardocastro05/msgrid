<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torneo – MSGRID</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
      }

      .header {
        background: #161b22;
        border-bottom: 1px solid #30363d;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header a {
        color: #58a6ff;
        text-decoration: none;
        font-size: 13px;
      }
      .header a:hover {
        text-decoration: underline;
      }
      .header h1 {
        font-size: 18px;
        color: #e6edf3;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 24px;
        border-bottom: 1px solid #30363d;
      }
      .tab {
        padding: 9px 18px;
        cursor: pointer;
        font-size: 14px;
        color: #8b949e;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab.active {
        color: #e6edf3;
        border-bottom-color: #f78166;
      }

      /* ── Grid ── */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 720px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }

      /* ── Card ── */
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
      }
      .card h2 {
        font-size: 14px;
        font-weight: 600;
        color: #8b949e;
        margin-bottom: 14px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ── Clasificación tabla ── */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        padding: 8px 12px;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        color: #8b949e;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border-bottom: 1px solid #30363d;
      }
      td {
        padding: 9px 12px;
        font-size: 13px;
        border-bottom: 1px solid #21262d;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #1c2128;
      }

      .pts-col {
        font-weight: 700;
        color: #58a6ff;
        text-align: right;
      }
      .rank-col {
        color: #8b949e;
        width: 28px;
      }
      .equipo-top {
        color: #f0e68c;
      } /* líder */

      /* ── Jornadas ── */
      .jornada-block {
        margin-bottom: 16px;
      }
      .jornada-titulo {
        font-size: 13px;
        font-weight: 600;
        color: #8b949e;
        padding: 6px 0;
        border-bottom: 1px solid #30363d;
        margin-bottom: 10px;
      }
      .enfrentamiento {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 6px;
        background: #0d1117;
        margin-bottom: 8px;
      }
      .equipo-label {
        flex: 1;
        font-size: 13px;
        color: #e6edf3;
        text-align: right;
      }
      .equipo-label.ganador {
        color: #3fb950;
        font-weight: 700;
      }
      .equipo-label.perdedor {
        color: #484f58;
      }

      .vs {
        color: #8b949e;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .pos-badge {
        font-size: 11px;
        color: #8b949e;
        background: #21262d;
        border-radius: 4px;
        padding: 2px 6px;
        white-space: nowrap;
      }

      .estado-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        white-space: nowrap;
      }
      .badge-jugado {
        background: #1a3a1a;
        color: #3fb950;
      }
      .badge-pendiente {
        background: #1c2128;
        color: #8b949e;
      }

      /* Formulario de ID de carrera */
      .form-carrera {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .form-carrera input {
        flex: 1;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 5px 9px;
        color: #e6edf3;
        font-size: 12px;
      }
      .form-carrera input:focus {
        outline: none;
        border-color: #58a6ff;
      }
      .btn-sm {
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 5px 12px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-sm:hover {
        background: #2ea043;
      }
      .btn-sm.danger {
        background: #6e1a1a;
        color: #f85149;
      }
      .btn-sm.secondary {
        background: #21262d;
        color: #8b949e;
        border: 1px solid #30363d;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .empty {
        color: #484f58;
        font-size: 13px;
        padding: 20px 0;
        text-align: center;
      }
      .alert {
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 14px;
      }
      .alert.ok {
        background: #1a3a1a;
        color: #3fb950;
      }
      .alert.err {
        background: #3a1a1a;
        color: #f85149;
      }

      /* Vista sin torneo seleccionado */
      .picker {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
      }
      .picker h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      .picker p {
        color: #8b949e;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .picker-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .picker select {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 9px 14px;
        color: #e6edf3;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/index.html">← Inicio</a>
      <h1 id="tituloPagina">Torneo</h1>
    </div>

    <div class="container">
      <!-- Alerta de mensajes -->
      <div id="alerta" style="display: none" class="alert"></div>

      <!-- Si no hay torneoId en la URL, mostrar selector -->
      <div id="vistaPickerWrap">
        <div class="picker">
          <h2>Selecciona un torneo</h2>
          <p>Elige el torneo que quieres ver o administrar.</p>
          <div class="picker-row">
            <select id="selectTorneo">
              <option value="">Cargando…</option>
            </select>
            <button class="btn-sm" onclick="irATorneo()">Ver torneo →</button>
          </div>
        </div>
      </div>

      <!-- Vista principal del torneo -->
      <div id="vistaTorneoWrap" style="display: none">
        <div class="grid-2">
          <!-- Clasificación -->
          <div class="card">
            <h2>Clasificación</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Equipo</th>
                  <th>PJ</th>
                  <th>PG</th>
                  <th>PE</th>
                  <th>PP</th>
                  <th style="text-align: right">Pts</th>
                </tr>
              </thead>
              <tbody id="tbodyClasif"></tbody>
            </table>
          </div>

          <!-- Jornadas -->
          <div class="card">
            <h2>Jornadas</h2>
            <div id="jornadasWrap"><div class="empty">Cargando…</div></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const TOKEN = localStorage.getItem("token") || "";

      // ── Arranque ────────────────────────────────────────────────────────────────
      const urlParams = new URLSearchParams(window.location.search);
      const torneoId = urlParams.get("torneoId") || urlParams.get("id");

      if (torneoId) {
        document.getElementById("vistaPickerWrap").style.display = "none";
        document.getElementById("vistaTorneoWrap").style.display = "block";
        cargarTorneo(torneoId);
      } else {
        cargarListaTorneos();
      }

      // ── Lista de torneos para el picker ────────────────────────────────────────
      async function cargarListaTorneos() {
        try {
          const res = await api("GET", "/api/torneos");
          const sel = document.getElementById("selectTorneo");
          sel.innerHTML = '<option value="">— Elige un torneo —</option>';
          (res || []).forEach((t) => {
            sel.innerHTML += `<option value="${t._id}">${esc(t.nombre)} (T${t.temporada})</option>`;
          });
        } catch {
          document.getElementById("selectTorneo").innerHTML =
            "<option>Error al cargar</option>";
        }
      }

      function irATorneo() {
        const id = document.getElementById("selectTorneo").value;
        if (id) window.location.search = `?torneoId=${id}`;
      }

      // ── Cargar datos de un torneo ───────────────────────────────────────────────
      async function cargarTorneo(id) {
        try {
          const torneo = await api("GET", `/api/torneos/${id}`);
          document.getElementById("tituloPagina").textContent = torneo.nombre;
          renderClasificacion(torneo.clasificacion);
          renderJornadas(torneo.jornadas, id);
        } catch (err) {
          mostrarAlerta("Error al cargar el torneo: " + err.message, true);
        }
      }

      // ── Clasificación ───────────────────────────────────────────────────────────
      function renderClasificacion(clasif) {
        const tbody = document.getElementById("tbodyClasif");
        if (!clasif || !clasif.length) {
          tbody.innerHTML =
            '<tr><td colspan="7" class="empty">Sin datos aún</td></tr>';
          return;
        }
        tbody.innerHTML = clasif
          .map(
            (e, i) => `
      <tr>
        <td class="rank-col">${i + 1}</td>
        <td class="${i === 0 ? "equipo-top" : ""}">${esc(e.equipo)}</td>
        <td>${e.pj}</td>
        <td>${e.pg}</td>
        <td>${e.pe}</td>
        <td>${e.pp}</td>
        <td class="pts-col">${e.pts}</td>
      </tr>
    `,
          )
          .join("");
      }

      // ── Jornadas ────────────────────────────────────────────────────────────────
      function renderJornadas(jornadas, torneoId) {
        const wrap = document.getElementById("jornadasWrap");
        if (!jornadas || !jornadas.length) {
          wrap.innerHTML = '<div class="empty">Aún no hay jornadas</div>';
          return;
        }

        wrap.innerHTML = jornadas
          .map(
            (j) => `
      <div class="jornada-block">
        <div class="jornada-titulo">Jornada ${j.numero}</div>
        ${j.enfrentamientos.map((enf) => renderEnfrentamiento(enf, j._id, torneoId)).join("")}
      </div>
    `,
          )
          .join("");
      }

      function renderEnfrentamiento(enf, jornadaId, torneoId) {
        const r = enf.resultado;
        const g = r?.ganador;
        const e1ganador = g === "equipo1";
        const e2ganador = g === "equipo2";

        const e1class =
          enf.estado === "jugado" ? (e1ganador ? "ganador" : "perdedor") : "";
        const e2class =
          enf.estado === "jugado" ? (e2ganador ? "ganador" : "perdedor") : "";

        const pos1 = r?.posEquipo1
          ? `<span class="pos-badge">P${r.posEquipo1}</span>`
          : "";
        const pos2 = r?.posEquipo2
          ? `<span class="pos-badge">P${r.posEquipo2}</span>`
          : "";

        const badge =
          enf.estado === "jugado"
            ? '<span class="estado-badge badge-jugado">✓ Jugado</span>'
            : '<span class="estado-badge badge-pendiente">Pendiente</span>';

        // Si hay que resolver: mostrar input para el ID de carrera
        const formCarrera =
          enf.estado !== "jugado"
            ? `
      <div class="form-carrera" style="margin-top:6px;">
        <input
          type="text"
          placeholder="ID carrera iGP…"
          id="input-${enf._id}"
          value="${enf.carreraId || ""}"
        />
        <button class="btn-sm" onclick="resolverEnfrentamiento('${torneoId}','${jornadaId}','${enf._id}','${esc(enf.equipo1)}','${esc(enf.equipo2)}')">
          Resolver
        </button>
        ${
          enf.carreraId
            ? `<a href="/pages/clasificacion.html?carreraId=${enf.carreraId}" target="_blank">
               <button class="btn-sm secondary" type="button">Ver carrera</button>
             </a>`
            : ""
        }
      </div>
    `
            : `
      <div style="margin-top:6px; font-size:11px; color:#484f58;">
        Carrera: ${enf.carreraId || "—"}
        <a href="/pages/clasificacion.html?carreraId=${enf.carreraId}" target="_blank" style="color:#58a6ff; margin-left:8px;">Ver resultados →</a>
      </div>
    `;

        return `
      <div class="enfrentamiento" id="enf-${enf._id}">
        <div style="flex:1">
          <div style="display:flex; align-items:center; gap:8px; justify-content:space-between">
            <span class="equipo-label ${e1class}">${esc(enf.equipo1)}</span>
            ${pos1}
            <span class="vs">VS</span>
            ${pos2}
            <span class="equipo-label ${e2class}" style="text-align:left">${esc(enf.equipo2)}</span>
            ${badge}
          </div>
          ${formCarrera}
        </div>
      </div>
    `;
      }

      // ── Resolver enfrentamiento ─────────────────────────────────────────────────
      async function resolverEnfrentamiento(
        torneoId,
        jornadaId,
        enfId,
        equipo1,
        equipo2,
      ) {
        const input = document.getElementById(`input-${enfId}`);
        const carreraId = input?.value.trim();
        if (!carreraId)
          return mostrarAlerta("Introduce el ID de la carrera", true);

        try {
          // 1. Consultar quién ganó en la carrera
          const url = `/api/igp/carrera/${carreraId}/enfrentamiento?equipo1=${encodeURIComponent(equipo1)}&equipo2=${encodeURIComponent(equipo2)}`;
          const resultado = await api("GET", url);

          // 2. Guardar en la base de datos
          await api(
            "PATCH",
            `/api/torneos/${torneoId}/jornadas/${jornadaId}/enfrentamientos/${enfId}`,
            {
              carreraId,
              posEquipo1: resultado.equipo1.pos,
              posEquipo2: resultado.equipo2.pos,
              ganador:
                resultado.ganador === equipo1
                  ? "equipo1"
                  : resultado.ganador === equipo2
                    ? "equipo2"
                    : resultado.ganador, // 'empate'
            },
          );

          mostrarAlerta(
            `✅ Resultado registrado: ${
              resultado.ganador === "empate"
                ? "Empate"
                : `Gana ${resultado.ganador}`
            } (P${resultado.equipo1.pos} vs P${resultado.equipo2.pos})`,
            false,
          );

          // Recargar
          cargarTorneo(torneoId);
        } catch (err) {
          mostrarAlerta("❌ " + err.message, true);
        }
      }

      // ── Helper API ──────────────────────────────────────────────────────────────
      async function api(method, url, body) {
        const opts = {
          method,
          headers: {
            Authorization: `Bearer ${TOKEN}`,
            "Content-Type": "application/json",
          },
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Error ${res.status}`);
        }
        return res.json();
      }

      function mostrarAlerta(msg, esError) {
        const el = document.getElementById("alerta");
        el.textContent = msg;
        el.className = `alert ${esError ? "err" : "ok"}`;
        el.style.display = "block";
        setTimeout(() => {
          el.style.display = "none";
        }, 5000);
      }

      function esc(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
