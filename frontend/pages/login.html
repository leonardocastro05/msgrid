<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · MS GRID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      :root {
        --asphalt: #0b0d10;
        --asphalt-2: #14171c;
        --bone: #f2f0ea;
        --bone-dim: #9a9d9f;
        --flag: #c8ff3d;
        --flag-dim: #8fb82b;
        --red: #ff3b30;
        --line: #232830;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--asphalt);
        color: var(--bone);
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        position: relative;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      :focus-visible {
        outline: 2px solid var(--flag);
        outline-offset: 3px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: repeating-linear-gradient(
          100deg,
          transparent 0px,
          transparent 78px,
          rgba(242, 240, 234, 0.025) 78px,
          rgba(242, 240, 234, 0.025) 80px
        );
        pointer-events: none;
        z-index: 0;
      }

      .back-link {
        position: fixed;
        top: 28px;
        left: 6vw;
        z-index: 5;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--bone-dim);
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        animation: fade-in 0.6s ease forwards;
        animation-delay: 0.1s;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--bone);
      }
      .back-link svg {
        width: 13px;
        height: 13px;
      }

      .login-wrap {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 380px;
        padding: 24px;
      }

      .login-logo {
        text-align: center;
        margin-bottom: 30px;
        opacity: 0;
        animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.05s;
      }
      .login-logo .mark {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: "Big Shoulders Display", sans-serif;
        font-weight: 900;
        font-size: 26px;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      .login-logo .mark .dot {
        width: 9px;
        height: 9px;
        background: var(--flag);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--flag);
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .login-logo p {
        color: var(--bone-dim);
        font-size: 11.5px;
        letter-spacing: 0.04em;
      }

      .grid-lights {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        margin-bottom: 26px;
        opacity: 0;
        animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.15s;
      }
      .grid-lights span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--line);
        box-shadow: inset 0 0 0 1px rgba(242, 240, 234, 0.08);
        animation: light-on-once 1.6s ease-out forwards;
      }
      .grid-lights span:nth-child(1) {
        animation-delay: 0.4s;
      }
      .grid-lights span:nth-child(2) {
        animation-delay: 0.55s;
      }
      .grid-lights span:nth-child(3) {
        animation-delay: 0.7s;
      }
      .grid-lights span:nth-child(4) {
        animation-delay: 0.85s;
      }
      .grid-lights span:nth-child(5) {
        animation-delay: 1s;
      }
      @keyframes light-on-once {
        0% {
          background: var(--line);
          box-shadow: inset 0 0 0 1px rgba(242, 240, 234, 0.08);
        }
        15% {
          background: var(--red);
          box-shadow: 0 0 14px rgba(255, 59, 48, 0.7);
        }
        60% {
          background: var(--red);
          box-shadow: 0 0 14px rgba(255, 59, 48, 0.7);
        }
        100% {
          background: var(--flag);
          box-shadow: 0 0 14px rgba(200, 255, 61, 0.7);
        }
      }

      .login-card {
        background: var(--asphalt-2);
        border: 1px solid var(--line);
        padding: 34px 32px;
        opacity: 0;
        animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.3s;
      }
      .card-eyebrow {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--flag);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .card-eyebrow::before {
        content: "";
        width: 20px;
        height: 1px;
        background: var(--flag);
      }
      .login-card h2 {
        font-family: "Big Shoulders Display", sans-serif;
        font-weight: 700;
        font-size: 28px;
        text-transform: uppercase;
        margin-bottom: 24px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-bottom: 16px;
      }
      .form-group label {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--bone-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .form-group input {
        background: var(--asphalt);
        border: 1px solid var(--line);
        color: var(--bone);
        padding: 12px 14px;
        font-size: 14.5px;
        font-family: "JetBrains Mono", monospace;
        width: 100%;
        border-radius: 2px;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--flag-dim);
      }
      .form-group input::placeholder {
        color: #565a5f;
      }

      .btn-login {
        width: 100%;
        margin-top: 6px;
        padding: 14px;
        font-size: 12.5px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
        color: var(--asphalt);
        background: var(--flag);
        border: none;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.2s ease;
      }
      .btn-login:hover:not(:disabled) {
        background: var(--bone);
        transform: translateY(-1px);
      }
      .btn-login:disabled {
        opacity: 0.6;
        cursor: default;
        transform: none;
      }
      .btn-login .material-icons {
        font-size: 17px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(11, 13, 16, 0.25);
        border-top-color: var(--asphalt);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-msg {
        background: rgba(255, 59, 48, 0.1);
        border: 1px solid var(--red);
        color: #ff8079;
        padding: 10px 13px;
        font-size: 12.5px;
        border-radius: 2px;
        margin-top: 14px;
        display: none;
        animation: shake 0.35s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      @keyframes rise {
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="back-link">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      Volver
    </a>

    <div class="login-wrap">
      <div class="login-logo">
        <div class="mark"><span class="dot"></span>MS GRID</div>
        <p>MS Manager &amp; iGP Manager · Panel de administración</p>
      </div>

      <div class="grid-lights" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="login-card">
        <div class="card-eyebrow">Acceso restringido</div>
        <h2>Iniciar sesión</h2>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="admin@msgrid.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-login" id="btnLogin" onclick="handleLogin()">
          <span class="material-icons">login</span>
          Entrar
        </button>

        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script>
      // Si ya está logueado, redirigir al dashboard
      if (estaLogueado()) window.location.href = "dashboard.html";

      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");
        const errEl = document.getElementById("errorMsg");

        if (!email || !password) {
          mostrarError("Rellena todos los campos");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Entrando…';
        errEl.style.display = "none";

        try {
          await login(email, password);
          window.location.href = "dashboard.html";
        } catch (err) {
          mostrarError(err.message);
          btn.disabled = false;
          btn.innerHTML = '<span class="material-icons">login</span> Entrar';
        }
      }

      function mostrarError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
